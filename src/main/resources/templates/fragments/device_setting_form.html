<html xmlns:th="http://www.thymeleaf.org">
  <div th:fragment="settings" class="space-y-6 min-h-screen pb-8">
    <form
      id="sform"
      class="space-y-6"
      action="#"
      th:action="@{/device-setting}"
      th:method="post"
      th:object="${settingsForm}"
    >
    <!-- Gradient Header Section with Icon -->
    <div class="relative overflow-hidden rounded-2xl bg-gradient-to-r from-slate-700 via-slate-800 to-gray-900 p-6 mb-6 shadow-lg">
      <div class="absolute inset-0 bg-grid-white/[0.05] bg-[size:20px_20px]"></div>
      <div class="relative flex items-center justify-between">
        <div class="flex items-center gap-4">
          <!-- Settings Icon -->
          <div class="bg-white/10 backdrop-blur-sm rounded-xl p-3">
            <svg class="size-10 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </div>
          <div>
            <h1 class="text-2xl font-bold text-white tracking-wide">Device Settings</h1>
            <p class="text-lg text-gray-300">Configure device properties and scanning options</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <button
            type="submit"
            class="inline-flex items-center gap-x-2 rounded-xl bg-white/20 backdrop-blur-sm px-4 py-2.5 text-sm font-semibold text-white hover:bg-white/30 transition-all duration-200 border border-white/30"
          >
            <svg class="size-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            UPDATE SETTINGS
          </button>
        </div>
      </div>
    </div>
      <!-- E-Passport Options Card -->
      <div class="group relative bg-white border border-gray-200 rounded-2xl shadow-sm hover:shadow-lg transition-all duration-300 overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-blue-500/10 to-indigo-500/10 rounded-bl-full"></div>
        <div class="relative p-6">
          <div class="flex items-center gap-3 mb-6">
            <div class="flex size-10 items-center justify-center rounded-xl bg-blue-100 group-hover:bg-blue-200 transition-colors">
              <svg class="size-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
              </svg>
            </div>
            <div>
              <h3 class="text-lg font-bold text-gray-900">E-Passport Properties</h3>
              <p class="text-sm text-gray-500">Configure data groups and authentication options</p>
            </div>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <fieldset
              th:replace="~{fragments/device_properties :: dgCheckboxGroup(${settingsForm})}"
            ></fieldset>
            <fieldset
              th:replace="~{fragments/device_properties :: authOptions(${settingsForm})}"
            ></fieldset>
          </div>
        </div>
      </div>

      <!-- Image Controls Card -->
      <div class="group relative bg-white border border-gray-200 rounded-2xl shadow-sm hover:shadow-lg transition-all duration-300 overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-purple-500/10 to-pink-500/10 rounded-bl-full"></div>
        <div class="relative p-6">
          <div class="flex items-center gap-3 mb-6">
            <div class="flex size-10 items-center justify-center rounded-xl bg-purple-100 group-hover:bg-purple-200 transition-colors">
              <svg class="size-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
            </div>
            <div>
              <h3 class="text-lg font-bold text-gray-900">Image Control Properties</h3>
              <p class="text-sm text-gray-500">Configure image capture and enhancement settings</p>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <fieldset
              th:replace="~{fragments/device_properties :: batchMode(${settingsForm})}"
            ></fieldset>
            <fieldset
              th:replace="~{fragments/device_properties :: antiGlare(${settingsForm})}"
            ></fieldset>
            <fieldset
              th:replace="~{fragments/device_properties :: etcOptions(${settingsForm})}"
            ></fieldset>
          </div>
        </div>
      </div>

    </form>

    <!-- PA API Settings Card (separate from device settings form) -->
    <div class="group relative bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-2xl shadow-sm hover:shadow-lg transition-all duration-300 overflow-hidden">
      <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-cyan-500/10 to-blue-500/10 rounded-bl-full"></div>
      <div class="relative p-6">
        <div class="flex items-center gap-3 mb-6">
          <div class="flex size-10 items-center justify-center rounded-xl bg-cyan-100 dark:bg-cyan-900/30 group-hover:bg-cyan-200 dark:group-hover:bg-cyan-900/50 transition-colors">
            <svg class="size-5 text-cyan-600 dark:text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
            </svg>
          </div>
          <div>
            <h3 class="text-lg font-bold text-gray-900 dark:text-neutral-100">PA API Settings</h3>
            <p class="text-sm text-gray-500 dark:text-neutral-400">Configure Passive Authentication API connection</p>
          </div>
        </div>

        <div class="space-y-4">
          <!-- Base URL -->
          <div class="bg-gray-50 dark:bg-neutral-700/50 rounded-xl p-4 border border-gray-100 dark:border-neutral-600">
            <label for="pa-base-url" class="block text-xs font-semibold text-gray-700 dark:text-neutral-300 uppercase tracking-wider mb-2">PA API Base URL</label>
            <input type="url" id="pa-base-url" placeholder="https://pkd.smartcoreinc.com"
                   class="w-full px-3 py-2.5 text-sm border border-gray-200 dark:border-neutral-600 rounded-lg bg-white dark:bg-neutral-800 text-gray-900 dark:text-neutral-100 focus:ring-2 focus:ring-cyan-500 focus:border-transparent placeholder-gray-400 dark:placeholder-neutral-500"/>
          </div>

          <!-- API Key -->
          <div class="bg-gray-50 dark:bg-neutral-700/50 rounded-xl p-4 border border-gray-100 dark:border-neutral-600">
            <label for="pa-api-key" class="block text-xs font-semibold text-gray-700 dark:text-neutral-300 uppercase tracking-wider mb-2">API Key</label>
            <div class="relative">
              <input type="password" id="pa-api-key" placeholder="Enter API Key"
                     class="w-full px-3 py-2.5 pr-10 text-sm border border-gray-200 dark:border-neutral-600 rounded-lg bg-white dark:bg-neutral-800 text-gray-900 dark:text-neutral-100 focus:ring-2 focus:ring-cyan-500 focus:border-transparent placeholder-gray-400 dark:placeholder-neutral-500 font-mono"/>
              <button type="button" onclick="toggleApiKeyVisibility()" class="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-gray-400 hover:text-gray-600 dark:hover:text-neutral-300">
                <svg id="pa-key-eye-icon" class="size-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- CA Certificate -->
          <div class="bg-gray-50 dark:bg-neutral-700/50 rounded-xl p-4 border border-gray-100 dark:border-neutral-600">
            <label class="block text-xs font-semibold text-gray-700 dark:text-neutral-300 uppercase tracking-wider mb-2">CA Certificate (Private CA)</label>
            <div id="ca-cert-info" class="text-xs text-gray-500 dark:text-neutral-400 mb-2"></div>
            <div class="flex items-center gap-3">
              <label class="inline-flex items-center gap-x-2 rounded-xl border border-gray-300 dark:border-neutral-600 bg-white dark:bg-neutral-800 px-4 py-2.5 text-sm font-medium text-gray-700 dark:text-neutral-300 hover:bg-gray-50 dark:hover:bg-neutral-700 cursor-pointer transition-colors">
                <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
                <span id="ca-upload-label">Upload .crt / .pem</span>
                <input type="file" id="ca-cert-file" accept=".crt,.pem,.cer" class="hidden" onchange="uploadCaCert(this)"/>
              </label>
              <button type="button" id="ca-delete-btn" onclick="deleteCaCert()" class="hidden inline-flex items-center gap-x-1 rounded-xl border border-red-300 dark:border-red-700 px-4 py-2.5 text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
                Delete
              </button>
            </div>
          </div>

          <!-- Status Message -->
          <div id="pa-settings-status" class="hidden rounded-lg p-3 text-sm"></div>

          <!-- Action Buttons -->
          <div class="flex items-center gap-3 pt-2">
            <button type="button" onclick="savePaApiSettings()"
                    class="inline-flex items-center gap-x-2 rounded-xl bg-gradient-to-r from-cyan-600 to-blue-600 px-4 py-2.5 text-sm font-semibold text-white hover:from-cyan-700 hover:to-blue-700 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2 transition-all shadow-sm">
              <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
              <span id="pa-save-text">Save Settings</span>
            </button>
            <button type="button" onclick="testPaConnection()"
                    class="inline-flex items-center gap-x-2 rounded-xl border border-cyan-300 dark:border-cyan-700 bg-white dark:bg-neutral-800 px-4 py-2.5 text-sm font-semibold text-cyan-700 dark:text-cyan-400 hover:bg-cyan-50 dark:hover:bg-cyan-900/20 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2 transition-all">
              <svg id="pa-test-spinner" class="hidden size-4 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              <svg id="pa-test-icon" class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
              <span id="pa-test-text">Test Connection</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function() {
        // Load current PA API settings
        fetch('/pa-api-settings')
          .then(function(resp) { return resp.json(); })
          .then(function(data) {
            document.getElementById('pa-base-url').value = data.baseUrl || '';
            document.getElementById('pa-api-key').value = data.apiKey || '';
          })
          .catch(function(err) {
            console.warn('Failed to load PA API settings:', err);
          });
      })();

      function toggleApiKeyVisibility() {
        var input = document.getElementById('pa-api-key');
        input.type = input.type === 'password' ? 'text' : 'password';
      }

      function showPaStatus(message, type) {
        var el = document.getElementById('pa-settings-status');
        el.className = 'rounded-lg p-3 text-sm';
        if (type === 'success') {
          el.className += ' bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 border border-green-200 dark:border-green-800';
        } else if (type === 'error') {
          el.className += ' bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 border border-red-200 dark:border-red-800';
        } else {
          el.className += ' bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-400 border border-blue-200 dark:border-blue-800';
        }
        el.textContent = message;
        el.classList.remove('hidden');
        if (type === 'success') {
          setTimeout(function() { el.classList.add('hidden'); }, 5000);
        }
      }

      function savePaApiSettings() {
        var baseUrl = document.getElementById('pa-base-url').value.trim();
        var apiKey = document.getElementById('pa-api-key').value.trim();
        var saveText = document.getElementById('pa-save-text');

        if (!baseUrl) {
          showPaStatus('Base URL is required.', 'error');
          return;
        }

        saveText.textContent = 'Saving...';

        fetch('/pa-api-settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ baseUrl: baseUrl, apiKey: apiKey })
        })
        .then(function(resp) { return resp.json(); })
        .then(function(data) {
          saveText.textContent = 'Save Settings';
          if (data.success) {
            showPaStatus('PA API settings saved successfully. Changes take effect immediately.', 'success');
          } else {
            showPaStatus('Failed to save: ' + (data.message || 'Unknown error'), 'error');
          }
        })
        .catch(function(err) {
          saveText.textContent = 'Save Settings';
          showPaStatus('Error: ' + err.message, 'error');
        });
      }

      // Load CA certificate info on page load
      (function loadCaCertInfo() {
        fetch('/pa-api-settings/ca-cert')
          .then(function(resp) { return resp.json(); })
          .then(function(data) {
            var infoEl = document.getElementById('ca-cert-info');
            var deleteBtn = document.getElementById('ca-delete-btn');
            if (data.exists) {
              infoEl.textContent = data.certInfo || 'Certificate loaded';
              infoEl.className = 'text-xs text-green-600 dark:text-green-400 mb-2';
              deleteBtn.classList.remove('hidden');
            } else {
              infoEl.textContent = 'No custom CA certificate installed. Using system default truststore.';
              infoEl.className = 'text-xs text-gray-500 dark:text-neutral-400 mb-2';
              deleteBtn.classList.add('hidden');
            }
          })
          .catch(function() {});
      })();

      function uploadCaCert(input) {
        if (!input.files || !input.files[0]) return;

        var formData = new FormData();
        formData.append('certFile', input.files[0]);

        var label = document.getElementById('ca-upload-label');
        label.textContent = 'Uploading...';

        fetch('/pa-api-settings/ca-cert', {
          method: 'POST',
          body: formData
        })
        .then(function(resp) { return resp.json(); })
        .then(function(data) {
          label.textContent = 'Upload .crt / .pem';
          if (data.success) {
            showPaStatus('CA certificate uploaded: ' + data.certInfo, 'success');
            // Refresh cert info display
            var infoEl = document.getElementById('ca-cert-info');
            infoEl.textContent = data.certInfo;
            infoEl.className = 'text-xs text-green-600 dark:text-green-400 mb-2';
            document.getElementById('ca-delete-btn').classList.remove('hidden');
          } else {
            showPaStatus('Certificate upload failed: ' + data.message, 'error');
          }
        })
        .catch(function(err) {
          label.textContent = 'Upload .crt / .pem';
          showPaStatus('Upload error: ' + err.message, 'error');
        });

        input.value = '';
      }

      function deleteCaCert() {
        if (!confirm('Remove the custom CA certificate and revert to system default truststore?')) return;

        fetch('/pa-api-settings/ca-cert/delete', { method: 'POST' })
          .then(function(resp) { return resp.json(); })
          .then(function(data) {
            if (data.success) {
              showPaStatus('CA certificate removed. Using system default truststore.', 'success');
              var infoEl = document.getElementById('ca-cert-info');
              infoEl.textContent = 'No custom CA certificate installed. Using system default truststore.';
              infoEl.className = 'text-xs text-gray-500 dark:text-neutral-400 mb-2';
              document.getElementById('ca-delete-btn').classList.add('hidden');
            } else {
              showPaStatus('Failed to delete: ' + data.message, 'error');
            }
          })
          .catch(function(err) {
            showPaStatus('Delete error: ' + err.message, 'error');
          });
      }

      function testPaConnection() {
        var spinner = document.getElementById('pa-test-spinner');
        var icon = document.getElementById('pa-test-icon');
        var text = document.getElementById('pa-test-text');

        spinner.classList.remove('hidden');
        icon.classList.add('hidden');
        text.textContent = 'Testing...';

        fetch('/passport/pa-health')
          .then(function(resp) { return resp.json(); })
          .then(function(data) {
            spinner.classList.add('hidden');
            icon.classList.remove('hidden');
            text.textContent = 'Test Connection';
            if (data.connected) {
              showPaStatus('PA API server is reachable and responding.', 'success');
            } else {
              showPaStatus('Connection failed: ' + (data.message || 'Server not reachable'), 'error');
            }
          })
          .catch(function(err) {
            spinner.classList.add('hidden');
            icon.classList.remove('hidden');
            text.textContent = 'Test Connection';
            showPaStatus('Connection test failed: ' + err.message, 'error');
          });
      }
    </script>
  </div>
</html>
