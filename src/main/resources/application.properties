spring.application.name=fphps_web_example

server.port=50000

# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:data/fphps_settings.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logging Configuration
# Root logging level (기본 로그 레벨)
logging.level.root=WARN

# Application logging (애플리케이션 로그)
logging.level.com.smartcoreinc=INFO
logging.level.com.smartcoreinc.fphps.example.fphps_web_example=INFO

# Framework logging (프레임워크 로그 최소화)
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.boot=WARN
logging.level.org.hibernate=WARN

# File logging (파일 로그 설정)
logging.file.name=log/application.log
logging.logback.rollingpolicy.max-file-size=5MB
logging.logback.rollingpolicy.max-history=3
logging.logback.rollingpolicy.total-size-cap=15MB

# Console logging pattern (간결한 콘솔 출력)
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

spring.thymeleaf.cache=false

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
logging.charset.file=UTF-8
logging.charset.console=UTF-8

# PA API Configuration (API Gateway)
# API Gateway를 통한 Passive Authentication 검증 API
pa-api.base-url=http://localhost:8080

# Face Verification API Configuration
# InsightFace 기반 Face Verification 마이크로서비스
face-api.base-url=http://localhost:10100

# Document Export Configuration
# Base directory for exporting passport data
# 여권 데이터 내보내기 기본 디렉토리
document-export.base-dir=D:/passport_exports